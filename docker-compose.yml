services:
  postgres:
    image: postgres:16
    container_name: cuidarbem-postgres
    restart: always
    environment:
      POSTGRES_DB: cuidarbem
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  pgadmin:
    image: dpage/pgadmin4
    container_name: cuidarbem-pgadmin
    restart: always
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@cuidarbem.com
      PGADMIN_DEFAULT_PASSWORD: admin123
    ports:
      - "5050:80"
    depends_on:
      - postgres

volumes:
  postgres_data: